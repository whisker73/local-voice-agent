<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voice Agent</title>
<style>
:root {
  --bg:       #0d1117;
  --surface:  #161b22;
  --surface2: #1c2128;
  --border:   #30363d;
  --text:     #e6edf3;
  --muted:    #8b949e;
  --blue:     #58a6ff;
  --green:    #3fb950;
  --yellow:   #e3b341;
  --purple:   #bc8cff;
  --red:      #f85149;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  font-size: 14px;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Header ── */
header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 20px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.logo { font-size: 15px; font-weight: 600; flex: 1; }
.logo span { opacity: .5; font-weight: 400; font-size: 13px; margin-left: 6px; }

#conn-badge {
  font-size: 12px;
  padding: 3px 10px;
  border-radius: 20px;
  background: var(--border);
  color: var(--muted);
  transition: all .3s;
}
#conn-badge.live { background: #1a3a1f; color: var(--green); }
#conn-badge.error { background: #3d1a1a; color: var(--red); }

/* ── Layout ── */
.layout {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ── Feed ── */
#feed {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  scroll-behavior: smooth;
}
#feed::-webkit-scrollbar { width: 6px; }
#feed::-webkit-scrollbar-track { background: transparent; }
#feed::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.empty-hint {
  margin: auto;
  text-align: center;
  color: var(--muted);
  font-size: 13px;
  line-height: 2;
}
.empty-hint .big { font-size: 40px; display: block; margin-bottom: 8px; }

/* ── Message cards ── */
.msg {
  border-radius: 8px;
  padding: 12px 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-left-width: 3px;
  animation: fadein .2s ease;
}
@keyframes fadein { from { opacity: 0; transform: translateY(4px); } }

.msg-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 6px;
  font-size: 12px;
  color: var(--muted);
}
.msg-icon { font-size: 14px; }
.msg-label { font-weight: 600; font-size: 12px; }
.msg-time { margin-left: auto; }

.msg-body { line-height: 1.5; word-break: break-word; }

/* Colours per type */
.msg.user   { border-left-color: var(--blue); }
.msg.user   .msg-label { color: var(--blue); }
.msg.agent  { border-left-color: var(--green); }
.msg.agent  .msg-label { color: var(--green); }
.msg.tool   { border-left-color: var(--purple); }
.msg.tool   .msg-label { color: var(--purple); }
.msg.error  { border-left-color: var(--red); }
.msg.error  .msg-label { color: var(--red); }

/* Tool call collapsible */
.tool-summary {
  cursor: pointer;
  user-select: none;
  display: flex;
  align-items: center;
  gap: 6px;
}
.tool-summary .arrow { transition: transform .2s; font-size: 10px; color: var(--muted); }
.tool-summary.open .arrow { transform: rotate(90deg); }

.tool-detail {
  display: none;
  margin-top: 8px;
  padding: 8px 10px;
  background: var(--surface2);
  border-radius: 6px;
  font-family: "Fira Code", "Cascadia Code", monospace;
  font-size: 12px;
  color: var(--muted);
  white-space: pre-wrap;
  word-break: break-word;
}
.tool-detail.visible { display: block; }
.tool-result-label { font-size: 11px; color: var(--muted); margin-top: 6px; margin-bottom: 2px; }

/* ── Sidebar ── */
.sidebar {
  width: 260px;
  flex-shrink: 0;
  border-left: 1px solid var(--border);
  background: var(--surface);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  padding: 16px;
  gap: 16px;
}

/* Status card */
.status-card {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 20px 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
}

.orb-wrap { position: relative; width: 60px; height: 60px; }

.orb {
  width: 60px; height: 60px;
  border-radius: 50%;
  background: var(--border);
  position: absolute;
  transition: background .4s;
}
.orb-ring {
  width: 60px; height: 60px;
  border-radius: 50%;
  position: absolute;
  border: 2px solid transparent;
  transition: border-color .4s;
}

/* States */
body.idle    .orb { background: var(--border); }
body.listening .orb { background: var(--blue); }
body.listening .orb-ring { border-color: var(--blue); animation: pulse 1.4s ease-out infinite; }
body.transcribing .orb { background: var(--yellow); }
body.transcribing .orb-ring { border-color: var(--yellow); animation: pulse 0.8s ease-out infinite; }
body.thinking .orb { background: var(--blue); animation: spin-orb 1.2s linear infinite; }
body.speaking .orb { background: var(--green); }
body.speaking .orb-ring { border-color: var(--green); animation: pulse 0.9s ease-out infinite; }

@keyframes pulse {
  0%   { transform: scale(1);   opacity: .8; }
  100% { transform: scale(1.7); opacity: 0; }
}
@keyframes spin-orb {
  0%   { box-shadow: 2px 0 8px var(--blue); }
  25%  { box-shadow: 0 2px 8px var(--blue); }
  50%  { box-shadow: -2px 0 8px var(--blue); }
  75%  { box-shadow: 0 -2px 8px var(--blue); }
  100% { box-shadow: 2px 0 8px var(--blue); }
}

#state-label {
  font-size: 13px;
  font-weight: 500;
  color: var(--muted);
  text-align: center;
}
body.listening     #state-label { color: var(--blue); }
body.transcribing  #state-label { color: var(--yellow); }
body.thinking      #state-label { color: var(--blue); }
body.speaking      #state-label { color: var(--green); }

/* ── Config card ── */
.config-card { display: flex; flex-direction: column; gap: 10px; }
.config-card h3 {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: var(--muted);
  margin-bottom: 2px;
}

label {
  display: flex;
  flex-direction: column;
  gap: 4px;
  font-size: 12px;
  color: var(--muted);
}

input[type="text"], input[type="number"] {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  padding: 6px 8px;
  font-size: 13px;
  outline: none;
  width: 100%;
  transition: border-color .2s;
}
input:focus { border-color: var(--blue); }

.btn {
  background: var(--blue);
  color: #fff;
  border: none;
  border-radius: 6px;
  padding: 8px 12px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: opacity .2s;
  margin-top: 2px;
}
.btn:hover { opacity: .85; }
.btn.saved { background: var(--green); }

.divider {
  border: none;
  border-top: 1px solid var(--border);
  margin: 2px 0;
}

.clear-btn {
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--muted);
  padding: 6px 12px;
  font-size: 12px;
  cursor: pointer;
  transition: all .2s;
  width: 100%;
}
.clear-btn:hover { border-color: var(--red); color: var(--red); }
</style>
</head>
<body class="idle">

<header>
  <div class="logo">🎙 Local Voice Agent <span>UI</span></div>
  <div id="conn-badge">● Verbinde...</div>
</header>

<div class="layout">

  <div id="feed">
    <div class="empty-hint" id="empty-hint">
      <span class="big">🎙</span>
      Warte auf Spracheingabe…
    </div>
  </div>

  <aside class="sidebar">

    <div class="status-card">
      <div class="orb-wrap">
        <div class="orb-ring"></div>
        <div class="orb"></div>
      </div>
      <div id="state-label">Bereit</div>
    </div>

    <hr class="divider">

    <div class="config-card">
      <h3>Einstellungen</h3>
      <label>Modell (Ollama)
        <input type="text" id="cfg-model" placeholder="qwen2.5:7b">
      </label>
      <label>STT-Sprache
        <input type="text" id="cfg-lang" placeholder="de" maxlength="5">
      </label>
      <label>Max. Tool-Calls
        <input type="number" id="cfg-tools" min="1" max="20">
      </label>
      <label>Max. History-Msgs
        <input type="number" id="cfg-history" min="5" max="200">
      </label>
      <button class="btn" id="save-btn" onclick="saveConfig()">Übernehmen</button>
    </div>

    <hr class="divider">
    <button class="clear-btn" onclick="clearFeed()">Feed leeren</button>

  </aside>
</div>

<script>
const feed = document.getElementById('feed');
const emptyHint = document.getElementById('empty-hint');
const connBadge = document.getElementById('conn-badge');
const stateLabel = document.getElementById('state-label');
const saveBtn = document.getElementById('save-btn');

const STATE_LABELS = {
  idle:         'Bereit',
  listening:    'Hört zu…',
  transcribing: 'Transkribiert…',
  thinking:     'Denkt…',
  speaking:     'Spricht…',
};

let ws = null;
let reconnectTimer = null;
// Track last tool card so we can attach the result to it
let lastToolCards = {};

function ts() {
  return new Date().toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
}

function hideHint() {
  if (emptyHint) emptyHint.remove();
}

function addMessage(cls, icon, label, body) {
  hideHint();
  const div = document.createElement('div');
  div.className = `msg ${cls}`;
  div.innerHTML = `
    <div class="msg-header">
      <span class="msg-icon">${icon}</span>
      <span class="msg-label">${label}</span>
      <span class="msg-time">${ts()}</span>
    </div>
    <div class="msg-body">${body}</div>`;
  feed.appendChild(div);
  feed.scrollTop = feed.scrollHeight;
  return div;
}

function addToolCall(name, args) {
  hideHint();
  const id = `tool-${Date.now()}`;
  const argsStr = JSON.stringify(args, null, 2);
  const div = document.createElement('div');
  div.className = 'msg tool';
  div.id = id;
  div.innerHTML = `
    <div class="msg-header">
      <span class="msg-icon">🔧</span>
      <span class="msg-label">Tool</span>
      <span class="msg-time">${ts()}</span>
    </div>
    <div class="tool-summary" onclick="toggleTool(this)">
      <span class="arrow">▶</span>
      <code>${escHtml(name)}(${summariseArgs(args)})</code>
    </div>
    <div class="tool-detail" id="${id}-detail">
      <div style="color:var(--purple)">Argumente:</div>${escHtml(argsStr)}
    </div>`;
  feed.appendChild(div);
  feed.scrollTop = feed.scrollHeight;
  lastToolCards[name] = id;
  return id;
}

function attachToolResult(name, result) {
  const id = lastToolCards[name];
  if (!id) return;
  const detail = document.getElementById(id + '-detail');
  if (!detail) return;
  const label = document.createElement('div');
  label.className = 'tool-result-label';
  label.textContent = 'Ergebnis:';
  const pre = document.createElement('div');
  pre.style.color = 'var(--green)';
  pre.textContent = result.length > 400 ? result.slice(0, 400) + '…' : result;
  detail.appendChild(label);
  detail.appendChild(pre);
}

function toggleTool(el) {
  el.classList.toggle('open');
  el.nextElementSibling.classList.toggle('visible');
}

function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function summariseArgs(args) {
  const pairs = Object.entries(args || {})
    .map(([k,v]) => {
      const vs = typeof v === 'string' ? `"${v.slice(0,30)}${v.length>30?'…':''}"` : String(v);
      return `${k}=${vs}`;
    });
  const s = pairs.join(', ');
  return escHtml(s.length > 60 ? s.slice(0,60)+'…' : s);
}

function setState(state) {
  document.body.className = state;
  stateLabel.textContent = STATE_LABELS[state] || state;
}

function applyConfig(data) {
  if (data.model_name    !== undefined) document.getElementById('cfg-model').value   = data.model_name;
  if (data.stt_language  !== undefined) document.getElementById('cfg-lang').value    = data.stt_language;
  if (data.max_tool_iterations !== undefined) document.getElementById('cfg-tools').value = data.max_tool_iterations;
  if (data.max_history_messages !== undefined) document.getElementById('cfg-history').value = data.max_history_messages;
}

function saveConfig() {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  const payload = {
    model_name:           document.getElementById('cfg-model').value.trim(),
    stt_language:         document.getElementById('cfg-lang').value.trim(),
    max_tool_iterations:  parseInt(document.getElementById('cfg-tools').value, 10),
    max_history_messages: parseInt(document.getElementById('cfg-history').value, 10),
  };
  fetch('/api/config', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(payload),
  }).then(() => {
    saveBtn.textContent = '✓ Gespeichert';
    saveBtn.classList.add('saved');
    setTimeout(() => {
      saveBtn.textContent = 'Übernehmen';
      saveBtn.classList.remove('saved');
    }, 2000);
  });
}

function clearFeed() {
  feed.innerHTML = '';
  lastToolCards = {};
  const hint = document.createElement('div');
  hint.className = 'empty-hint';
  hint.id = 'empty-hint';
  hint.innerHTML = '<span class="big">🎙</span>Warte auf Spracheingabe…';
  feed.appendChild(hint);
}

function handleEvent(ev) {
  switch (ev.type) {
    case 'status':
      setState(ev.state);
      break;
    case 'stt':
      addMessage('user', '🎤', 'Benutzer', escHtml(ev.text));
      break;
    case 'tool_call':
      if (ev.name) addToolCall(ev.name, ev.args || {});
      break;
    case 'tool_result':
      attachToolResult(ev.name, ev.result || '');
      break;
    case 'response':
      addMessage('agent', '🤖', 'Agent', escHtml(ev.text));
      break;
    case 'config':
      applyConfig(ev);
      break;
    case 'error':
      addMessage('error', '⚠', 'Fehler', escHtml(ev.message || ''));
      break;
  }
}

function connect() {
  const url = `ws://${location.host}/ws`;
  ws = new WebSocket(url);

  ws.onopen = () => {
    connBadge.textContent = '● Live';
    connBadge.className = 'live';
    clearTimeout(reconnectTimer);
  };

  ws.onmessage = (e) => {
    try { handleEvent(JSON.parse(e.data)); }
    catch(err) { console.error('parse error', err); }
  };

  ws.onclose = () => {
    connBadge.textContent = '● Getrennt';
    connBadge.className = 'error';
    setState('idle');
    reconnectTimer = setTimeout(connect, 3000);
  };

  ws.onerror = () => ws.close();
}

connect();
</script>
</body>
</html>
